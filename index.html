<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OX로 알아보는 IP</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.88);
      --card-solid: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --safe: #15803d;
      --safe-soft: #dcfce7;
      --caution: #b45309;
      --caution-soft: #fef3c7;
      --risk: #b91c1c;
      --risk-soft: #fee2e2;
      --purple: #7c3aed;
      --purple-soft: #ede9fe;
      --shadow: 0 10px 25px rgba(31, 41, 55, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(124,58,237,0.10), transparent 26%),
        linear-gradient(180deg, #f9fbff 0%, #f4f7fb 100%);
      min-height: 100vh;
    }

    .container {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-badge {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    h1, h2, h3, h4, p { margin: 0; }

    .muted { color: var(--muted); }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      margin-bottom: 18px;
    }

    .hero-title {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .hero-desc {
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 62ch;
    }

    .pill-row, .tag-row, .chip-row, .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill, .chip, .tag, .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .pill { background: #eef2ff; color: #4338ca; }
    .chip { background: #f3f4f6; color: #374151; }
    .tag { background: #f9fafb; border-color: var(--line); color: #4b5563; }
    .badge { background: var(--primary-soft); color: var(--primary); }

    .grid-2, .grid-3, .stats-grid, .category-grid, .achievement-grid, .results-grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .stats-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .category-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .achievement-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .results-grid { grid-template-columns: 1fr 1fr; }

    .panel {
      padding: 22px;
    }

    .stat-card {
      padding: 18px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      text-align: center;
      min-width: 0;
    }

    .stat-value {
      display: block;
      width: 100%;
      max-width: 100%;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
      font-variant-numeric: tabular-nums;
      margin-bottom: 10px;
    }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

    button, a.btn {
      font: inherit;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    button:hover, a.btn:hover { transform: translateY(-1px); }
    button:active, a.btn:active { transform: translateY(0); }

    .btn {
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .btn-primary { background: linear-gradient(135deg, var(--primary), #3b82f6); color: white; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--line); }
    .btn-soft { background: #eef2ff; color: #4338ca; }
    .btn-danger-soft { background: #fff1f2; color: #be123c; }

    .mode-card, .category-card, .missed-card, .scenario-card, .feedback-card, .result-card, .list-card {
      padding: 22px;
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .mode-card button, .category-card button, a.btn { width: 100%; margin-top: 14px; }

    .mode-icon, .category-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      font-size: 22px;
      margin-bottom: 14px;
    }

    .mode-icon { background: var(--primary-soft); }
    .category-icon { background: #f3f4f6; }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .progress-bar {
      flex: 1;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--purple));
      width: 0%;
      transition: width 0.22s ease;
    }

    .timer-card {
      display: grid;
      gap: 8px;
      min-width: 180px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
    }

    .timer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
    }

    .timer-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(154, 52, 18, 0.16);
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f97316, #ef4444);
      transition: width 0.2s linear;
    }

    .scenario-card {
      display: grid;
      gap: 18px;
    }

    .scenario-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .context-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .context-item {
      padding: 14px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid var(--line);
    }

    .question-box {
      padding: 22px;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid #dbeafe;
    }

    .ox-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .ox-btn {
      min-height: 110px;
      border-radius: 22px;
      font-size: clamp(32px, 8vw, 48px);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: white;
    }

    .btn-o { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .btn-x { background: linear-gradient(135deg, #dc2626, #ef4444); }

    .confidence-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .confidence-btn {
      padding: 12px 14px;
      border-radius: 14px;
      background: white;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .confidence-btn.active {
      background: var(--primary-soft);
      border-color: #93c5fd;
      color: var(--primary);
    }

    .feedback-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .status-box {
      padding: 16px 18px;
      border-radius: 18px;
      font-weight: 800;
      min-width: 200px;
    }

    .status-correct { background: var(--safe-soft); color: var(--safe); }
    .status-wrong { background: var(--risk-soft); color: var(--risk); }

    .callout {
      padding: 16px 18px;
      border-radius: 18px;
      border-left: 6px solid;
      background: #fafafa;
    }

    .callout-safe { border-color: var(--safe); background: #f0fdf4; }
    .callout-caution { border-color: var(--caution); background: #fffbeb; }
    .callout-risk { border-color: var(--risk); background: #fef2f2; }

    .action-proceed { background: var(--safe-soft); color: var(--safe); }
    .action-confirm-license { background: var(--caution-soft); color: var(--caution); }
    .action-escalate { background: var(--purple-soft); color: var(--purple); }
    .action-stop { background: var(--risk-soft); color: var(--risk); }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .list-item {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
    }

    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden { display: none !important; }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .resume-banner {
      padding: 16px 18px;
      border-radius: 18px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .difficulty-easy { background: #ecfdf5; color: #047857; }
    .difficulty-medium { background: #fffbeb; color: #b45309; }
    .difficulty-hard { background: #fef2f2; color: #b91c1c; }

    @media (max-width: 920px) {
      .hero, .results-grid, .grid-2, .grid-3, .stats-grid, .category-grid, .achievement-grid, .context-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .hero, .results-grid, .grid-2, .grid-3, .stats-grid, .category-grid, .achievement-grid, .context-grid, .ox-row {
        grid-template-columns: 1fr;
      }

      .container { width: min(100% - 16px, 1120px); }
      .hero, .panel, .mode-card, .category-card, .scenario-card, .feedback-card, .result-card, .list-card { padding: 18px; }
      .hero-title { font-size: 30px; }
      .ox-btn { min-height: 92px; }
      .timer-card { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">IP</div>
        <div>
          <h2>OX로 알아보는 IP</h2>
          <p class="muted small">광고·콘텐츠 사용 전 지식재산권 및 관련 법률 리스크를 퀴즈형으로 점검하는 교육 앱</p>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="homeBtn">홈</button>
        <button class="btn btn-secondary" id="resetProgressBtn">진도 초기화</button>
      </div>
    </div>

    <main id="app"></main>

    <p class="footer-note">로컬 저장소에만 학습 이력이 보관됩니다. 외부 전송, 로그인, 서버 연동은 없습니다.<br><br><strong>:: HSAD 법무팀 ::</strong></p>
  </div>

  <script>
    const STORAGE_KEYS = {
      progress: 'ip_ox_progress_v1',
      session: 'ip_ox_active_session_v1',
      history: 'ip_ox_session_history_v1'
    };

    const CATEGORIES = {
      stock: { label: '스톡 이미지', icon: '🖼️' },
      ai: { label: 'AI 생성물', icon: '🤖' },
      model: { label: '모델·초상', icon: '👤' },
      trademark: { label: '상표·브랜드', icon: '™️' },
      media: { label: '드라마·스포츠 영상', icon: '🎬' },
      font: { label: '폰트', icon: '🔤' },
      location: { label: '장소·건물·미술품', icon: '🏢' },
      audio: { label: '음악·오디오', icon: '🎵' },
      basics: { label: '저작권법 기초개념', icon: '📚' }
    };

    const RECOMMENDED_ACTION_META = {
      proceed: { label: '진행 가능', className: 'action-proceed' },
      confirm_license: { label: '라이선스 확인 필요', className: 'action-confirm-license' },
      escalate_legal: { label: '법무 협의 필요', className: 'action-escalate' },
      do_not_use: { label: '사용 중단/대체 권고', className: 'action-stop' }
    };

    const DIFFICULTY_LABELS = {
      easy: '기초',
      medium: '실무',
      hard: '고난도'
    };

    const SCENARIOS = [
      {
        id: 'stock-01', category: 'stock', title: '에디토리얼 전용 이미지의 광고 사용',
        assetType: '스톡 이미지', intendedUse: '유료 SNS 광고', region: '대한민국', channel: '인스타그램', duration: '1개월',
        scenarioDescription: '스톡 사이트에서 내려받은 이미지에 “Editorial Use Only” 표시가 있습니다. 마케팅팀은 이를 그대로 브랜드 홍보용 유료 광고에 넣고자 합니다.',
        statement: '별도 권리 확인 없이 바로 광고 집행해도 안전하다.', correctAnswer: 'X',
        explanation: '“Editorial Use Only”는 통상 보도·논평 등 비상업적 맥락에 한정됩니다. 브랜드 홍보용 광고는 상업적 이용에 해당하므로 사용 범위를 벗어날 가능성이 매우 높습니다.',
        riskTags: ['Editorial Only', '상업적 이용 제한', '라이선스 범위 초과'], recommendedAction: 'do_not_use', difficulty: 'easy'
      },
      {
        id: 'stock-02', category: 'stock', title: '사내 보고용 이미지 활용',
        assetType: '스톡 이미지', intendedUse: '내부 보고서', region: '사내 한정', channel: '사내 발표자료', duration: '일회성',
        scenarioDescription: '정식 라이선스 구매한 스톡 이미지를 외부 배포 없이 내부 전략회의용 PPT에만 삽입하려고 합니다.',
        statement: '통상적인 라이선스 조건상 내부 보고용 이용은 광고 집행보다 리스크가 낮다.', correctAnswer: 'O',
        explanation: '대부분의 스톡 라이선스는 내부 프레젠테이션 등 제한적 이용을 광고·상품화보다 낮은 위험으로 봅니다. 다만 구체적 약관상 금지 여부는 최종 확인이 필요합니다.',
        riskTags: ['내부 이용', '약관 확인'], recommendedAction: 'confirm_license', difficulty: 'easy'
      },
      {
        id: 'stock-03', category: 'stock', title: '대량 인쇄물에 동일 이미지 재사용',
        assetType: '스톡 이미지', intendedUse: '전국 오프라인 리플릿 80만부', region: '대한민국', channel: '인쇄물', duration: '3개월',
        scenarioDescription: '기존에 구매한 일반 라이선스 스톡 이미지를 대량 인쇄 캠페인에 사용하려고 합니다. 약관에는 대량 복제 시 Extended License가 필요할 수 있다고 적혀 있습니다.',

        explanation: '일반 라이선스는 복제 부수, 예산 규모, 상품화 범위 등에 제한을 두는 경우가 많습니다. 대량 인쇄는 Extended License 검토 대상입니다.',
        riskTags: ['Extended License', '복제수량 제한', '상업 배포'], recommendedAction: 'confirm_license', difficulty: 'medium'
      },
      {
        id: 'stock-04', category: 'stock', title: '경기장 사진 속 스폰서 로고 노출',

        scenarioDescription: '경기장 전경 사진을 광고에 쓰려는데 배경 전광판에 타사 스폰서 로고가 선명하게 보입니다.',
        statement: '배경에 우연히 잡힌 타사 로고는 언제나 문제되지 않는다.', correctAnswer: 'X',
        explanation: '광고 맥락에서 타사 상표가 오인·연상 또는 후원관계 오해를 유발할 수 있습니다. 특히 로고가 선명하고 중심적으로 보이면 검토 필요성이 커집니다.',
        riskTags: ['상표 노출', '오인 가능성', '광고 맥락'], recommendedAction: 'escalate_legal', difficulty: 'medium'
      },
      {
        id: 'ai-01', category: 'ai', title: '유명 연예인 닮은꼴 AI 이미지',
        assetType: 'AI 생성 이미지', intendedUse: '프로모션 배너', region: '대한민국', channel: '앱 배너', duration: '2주',
        scenarioDescription: '프롬프트로 특정 연예인을 직접 언급하지는 않았지만, 결과물이 특정 유명인의 얼굴과 매우 유사하게 생성되었습니다.',
        statement: '실명을 쓰지 않았으므로 초상권·퍼블리시티권 문제는 없다.', correctAnswer: 'X',
        explanation: '실명 기재 여부와 무관하게 특정인을 식별할 수 있을 정도로 유사하면 초상, 성명, 퍼블리시티 관련 분쟁 소지가 있습니다. 광고 목적이면 리스크가 더 큽니다.',
        riskTags: ['닮은꼴', '초상권', '퍼블리시티권', '광고 사용'], recommendedAction: 'do_not_use', difficulty: 'medium'
      },
      {

    function buildProgress() {
      const categoryStats = {};
      Object.keys(CATEGORIES).forEach(key => {
        categoryStats[key] = { played: 0, correct: 0 };
      });
      return JSON.parse(JSON.stringify({ ...DEFAULT_PROGRESS, categoryStats }));
    }

    function sanitizeProgress() {
      if (!state.progress || typeof state.progress !== 'object') state.progress = buildProgress();
      if (!state.progress.categoryStats) state.progress.categoryStats = buildProgress().categoryStats;
      state.progress.categoryStats = Object.fromEntries(
        Object.keys(CATEGORIES).map(key => [key, state.progress.categoryStats[key] || { played: 0, correct: 0 }])
      );
      if (!Array.isArray(state.progress.achievements)) state.progress.achievements = [];
      if (!Array.isArray(state.progress.missedScenarioIds)) state.progress.missedScenarioIds = [];
    }

    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function saveJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function persistAll() {
      saveJSON(STORAGE_KEYS.progress, state.progress);
      saveJSON(STORAGE_KEYS.history, state.sessionHistory);
      if (state.activeSession) saveJSON(STORAGE_KEYS.session, state.activeSession);
      else localStorage.removeItem(STORAGE_KEYS.session);
    }

      return CATEGORIES[key]?.label || key;

      return CATEGORIES[key]?.icon || '📁';

      return level === 'easy' ? 'difficulty-easy' : level === 'medium' ? 'difficulty-medium' : 'difficulty-hard';
    }

    function getActionMeta(action) {
      return RECOMMENDED_ACTION_META[action] || RECOMMENDED_ACTION_META.confirm_license;
    }

    function shuffle(array) {
      const clone = [...array];
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    function getScenariosForMode(mode, category) {
      if (mode === 'review') {
        return shuffle(SCENARIOS.filter(s => state.progress.missedScenarioIds.includes(s.id)));
      }
      if (mode === 'category') {
        return shuffle(SCENARIOS.filter(s => s.category === category));
      }
      return shuffle([...SCENARIOS]).slice(0, 10);
    }

      return isCorrect ? 10 : 0;

      return [
        { key: 'first_play', label: '첫 플레이 완료', condition: progress.totalPlayed >= 1 },
        { key: 'three_streak', label: '연속 3문제 정답', condition: sessionSummary.bestStreak >= 3 || progress.bestStreak >= 3 },
        { key: 'accuracy_80', label: '세션 정확도 80% 이상', condition: sessionSummary.accuracy >= 80 },
        { key: 'all_categories', label: '모든 카테고리 경험', condition: Object.values(progress.categoryStats).every(v => v.played > 0) },
        { key: 'veteran_30', label: '30문제 이상 풀이', condition: progress.totalPlayed >= 30 }
      ];
    }

    function updateAchievements(sessionSummary) {
      const unlocked = [];
      achievementCatalog(state.progress, sessionSummary).forEach(item => {
        if (item.condition && !state.progress.achievements.includes(item.key)) {
          state.progress.achievements.push(item.key);
          unlocked.push(item.label);
        }
      });
      return unlocked;
    }

    function startGame(mode, category = 'all') {
      const list = getScenariosForMode(mode, category);
      if (!list.length) {
        alert(mode === 'review' ? '복습할 오답 문제가 아직 없습니다.' : '해당 조건의 문제가 없습니다.');
        return;
      }
      state.mode = mode;
      state.selectedCategory = category;
      state.scenarios = list;
      state.currentIndex = 0;
      state.answers = [];
      state.confidence = null;
      state.questionDeadline = getQuestionDeadline();
      state.lastFeedback = null;
      state.screen = 'game';
      state.activeSession = buildActiveSession();
      persistAll();
      render();
    }

    function buildActiveSession() {
      return {
        mode: state.mode,
        selectedCategory: state.selectedCategory,
        scenarioIds: state.scenarios.map(s => s.id),
        currentIndex: state.currentIndex,
        answers: state.answers,
        confidence: state.confidence,
        questionDeadline: state.questionDeadline,
        savedAt: new Date().toISOString()
      };
    }

    function restoreSession() {
      if (!state.activeSession) return;
      const restoredScenarios = state.activeSession.scenarioIds.map(id => SCENARIOS.find(s => s.id === id)).filter(Boolean);
      if (!restoredScenarios.length) return;
      state.mode = state.activeSession.mode;
      state.selectedCategory = state.activeSession.selectedCategory;
      state.scenarios = restoredScenarios;
      state.currentIndex = state.activeSession.currentIndex || 0;
      state.answers = Array.isArray(state.activeSession.answers) ? state.activeSession.answers : [];
      state.confidence = state.activeSession.confidence || null;
      state.questionDeadline = state.activeSession.questionDeadline || getQuestionDeadline();
      state.lastFeedback = null;
      state.screen = 'game';
      render();
    }

        userAnswer,
        correctAnswer: scenario.correctAnswer,
        isCorrect,
        confidence: state.confidence,
        points,
        answeredAt: new Date().toISOString()
      };
      state.answers.push(answerRecord);
      state.lastFeedback = { scenario, answerRecord };
      state.screen = 'feedback';
      state.questionDeadline = null;
      state.activeSession = buildActiveSession();
      persistAll();
      render();
    }

    function nextStep() {
      clearQuestionTimer();
      if (state.currentIndex < state.scenarios.length - 1) {
        state.currentIndex += 1;
        state.confidence = null;
        state.questionDeadline = getQuestionDeadline();
        state.lastFeedback = null;
        state.screen = 'game';
        state.activeSession = buildActiveSession();
        persistAll();
        render();
      } else {
        finalizeSession();
      }
    }

    function finalizeSession() {
      clearQuestionTimer();
      const totalQuestions = state.answers.length;
      const correctCount = state.answers.filter(a => a.isCorrect).length;
      const accuracy = totalQuestions ? Math.round((correctCount / totalQuestions) * 100) : 0;
      let streak = 0;
      let bestStreak = 0;
      let score = 0;

      state.answers.forEach(record => {
        if (record.isCorrect) {
          streak += 1;
          bestStreak = Math.max(bestStreak, streak);
        } else {
          streak = 0;
        }
        score += record.points || 0;
      });

      const summary = {
        id: `session-${Date.now()}`,
        date: new Date().toISOString(),
        mode: state.mode,
        category: state.selectedCategory,
        totalQuestions,
        correctCount,
        accuracy,
        bestStreak,
        score,
        answers: state.answers
      };

      state.answers.forEach(record => {
        const scenario = SCENARIOS.find(s => s.id === record.scenarioId);
        if (!scenario) return;
        state.progress.totalPlayed += 1;
        if (record.isCorrect) state.progress.totalCorrect += 1;
        state.progress.totalScore += record.points || 0;
        state.progress.bestStreak = Math.max(state.progress.bestStreak, bestStreak);
        state.progress.categoryStats[scenario.category].played += 1;
        if (record.isCorrect) state.progress.categoryStats[scenario.category].correct += 1;

        const missed = state.progress.missedScenarioIds;
        const index = missed.indexOf(record.scenarioId);
        if (!record.isCorrect && index === -1) missed.push(record.scenarioId);
        if (record.isCorrect && index >= 0) missed.splice(index, 1);
      });

      summary.unlockedAchievements = updateAchievements(summary);
      state.sessionHistory.unshift(summary);
      state.sessionHistory = state.sessionHistory.slice(0, 12);
      state.screen = 'results';
      state.activeSession = null;
      state.questionDeadline = null;
      persistAll();
      render();
    }

    function getModeLabel(mode) {
      if (mode === 'quick') return '퀵 플레이';
      if (mode === 'category') return '카테고리 연습';
      if (mode === 'review') return '오답 복습';
      return mode;
    }

    function overallAccuracy(progress = state.progress) {
      return progress.totalPlayed ? Math.round((progress.totalCorrect / progress.totalPlayed) * 100) : 0;
    }

    function categoryPerformanceEntries() {
      return Object.keys(CATEGORIES).map((key) => {
        const value = state.progress.categoryStats[key] || { played: 0, correct: 0 };
        const accuracy = value.played ? Math.round((value.correct / value.played) * 100) : 0;
        return { key, ...value, accuracy };
      }).sort((a, b) => b.accuracy - a.accuracy);
    }

    function strongestWeakest() {
      const played = categoryPerformanceEntries().filter(v => v.played > 0);
      if (!played.length) return { strong: null, weak: null };
      return {
        strong: played[0],
        weak: [...played].sort((a, b) => a.accuracy - b.accuracy)[0]
      };
    }

    function currentScenario() {
      return state.scenarios[state.currentIndex];
    }

    function getQuestionDeadline() {
      return Date.now() + QUESTION_TIME_LIMIT_SECONDS * 1000;
    }

    function getRemainingTime() {
      const deadline = state.questionDeadline || getQuestionDeadline();
      const remainingMs = Math.max(0, deadline - Date.now());
      return {
        ms: remainingMs,
        seconds: Math.ceil(remainingMs / 1000),
        percent: Math.max(0, Math.min(100, (remainingMs / (QUESTION_TIME_LIMIT_SECONDS * 1000)) * 100))
      };
    }

    function clearQuestionTimer() {
      if (questionTimerId) {
        clearInterval(questionTimerId);
        questionTimerId = null;
      }
      if (questionTimeoutId) {
        clearTimeout(questionTimeoutId);
        questionTimeoutId = null;
      }
    }

    function startQuestionTimer() {
      clearQuestionTimer();
      if (state.screen !== 'game') return;
      if (!state.questionDeadline) state.questionDeadline = getQuestionDeadline();
      const expectedIndex = state.currentIndex;
      const expectedScenarioId = currentScenario()?.id;

      const expireQuestion = () => {
        handleQuestionTimeout(expectedIndex, expectedScenarioId);
      };
      const initialTimer = getRemainingTime();
      if (initialTimer.ms <= 0) {
        expireQuestion();
        return;
      }

      const updateTimerView = () => {
        const timer = getRemainingTime();
        const textEl = document.getElementById('timerSeconds');
        const fillEl = document.getElementById('timerFill');
        if (textEl) textEl.textContent = `${timer.seconds}초`;
        if (fillEl) fillEl.style.width = `${timer.percent}%`;
        if (timer.ms <= 0) {
          expireQuestion();
        }
      };

      updateTimerView();
      questionTimeoutId = setTimeout(expireQuestion, initialTimer.ms + 100);
      questionTimerId = setInterval(updateTimerView, 250);
    }

    function handleQuestionTimeout(expectedIndex = state.currentIndex, expectedScenarioId = currentScenario()?.id) {
      if (state.screen !== 'game') return;
      if (expectedIndex !== state.currentIndex) return;
      const scenario = currentScenario();
      if (!scenario || scenario.id !== expectedScenarioId || state.answers.length !== state.currentIndex) return;
      clearQuestionTimer();

      const answerRecord = {
        scenarioId: scenario.id,
        userAnswer: '시간 초과',
        correctAnswer: scenario.correctAnswer,
        isCorrect: false,
        confidence: state.confidence,
        points: 0,
        timedOut: true,
        answeredAt: new Date().toISOString()
      };

      state.answers.push(answerRecord);
      state.lastFeedback = { scenario, answerRecord };
      state.screen = 'feedback';
      state.questionDeadline = null;
      state.activeSession = buildActiveSession();
      persistAll();
      render();
    }

            <div class="list-card">
              <div class="section-title"><h3>권장 다음 조치</h3></div>
              <div class="chip-row" style="margin-bottom: 10px;">
                <span class="chip ${actionMeta.className}">${actionMeta.label}</span>
              </div>
              <p class="muted" style="line-height: 1.75;">${buildNextStepText(scenario.recommendedAction)}</p>
            </div>
          </div>

          <div class="section-title"><h3>리스크 태그</h3></div>
          <div class="tag-row" style="margin-bottom: 18px;">
            ${scenario.riskTags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" id="nextBtn">${state.currentIndex < state.scenarios.length - 1 ? '다음 문제' : '결과 보기'}</button>
            <button class="btn btn-secondary" id="backHomeFromFeedback">홈으로</button>
          </div>
        </section>
      `;

      document.getElementById('nextBtn').onclick = nextStep;
      document.getElementById('backHomeFromFeedback').onclick = () => {
        state.screen = 'home';
        render();
      };
    }

    function renderResults() {
      const session = state.sessionHistory[0];
      if (!session) {
        state.screen = 'home';
        return render();
      }
      const wrongAnswers = session.answers.filter(a => !a.isCorrect).map(a => {
        const scenario = SCENARIOS.find(s => s.id === a.scenarioId);
        return { ...a, scenario };
      });
      const strongWeak = strongestWeakest();
      const learningPoints = buildLearningPoints(session);

      app.innerHTML = `
        <section class="card panel" style="margin-bottom: 18px;">
          <div class="section-title">
            <div>
              <h2>세션 결과 리포트</h2>
              <p class="muted small">${new Date(session.date).toLocaleString('ko-KR')} · ${getModeLabel(session.mode)}${session.category !== 'all' ? ` · ${categoryLabel(session.category)}` : ''}</p>
            </div>
            <div class="chip-row">
              <span class="chip">정답 ${session.correctCount}/${session.totalQuestions}</span>
              <span class="chip">최고 연속 ${session.bestStreak}</span>
              <span class="badge">점수 ${session.score}</span>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">${session.accuracy}%</div><div class="muted small">세션 정확도</div></div>
            <div class="stat-card"><div class="stat-value">${session.correctCount}</div><div class="muted small">정답 수</div></div>
            <div class="stat-card"><div class="stat-value">${wrongAnswers.length}</div><div class="muted small">오답 수</div></div>
            <div class="stat-card"><div class="stat-value">${session.score}</div><div class="muted small">획득 점수</div></div>
          </div>
        </section>

        <section class="results-grid" style="margin-bottom: 18px;">
          <div class="result-card">
            <div class="section-title"><h3>학습 요약</h3></div>
            <div class="list">
              <div class="list-item"><strong>강점 영역</strong><p class="muted" style="margin-top: 8px;">${strongWeak.strong ? `${categoryLabel(strongWeak.strong.key)}에서 누적 정확도 ${strongWeak.strong.accuracy}%를 기록했습니다.` : '아직 누적 데이터가 충분하지 않습니다.'}</p></div>
              <div class="list-item"><strong>보완 필요 영역</strong><p class="muted" style="margin-top: 8px;">${strongWeak.weak ? `${categoryLabel(strongWeak.weak.key)} 카테고리를 추가 복습해 보세요.` : '추가 풀이 후 분석이 가능합니다.'}</p></div>
              <div class="list-item"><strong>실무 권고</strong><p class="muted" style="margin-top: 8px;">광고·홍보 집행 전에는 자산 유형별로 <em>권리자, 허용 범위, 매체·기간·지역, 제3자 권리 포함 여부</em>를 체크리스트로 점검하는 습관이 필요합니다.</p></div>
            </div>
          </div>
          <div class="result-card">
            <div class="section-title"><h3>추천 학습 포인트</h3></div>
            <div class="list">
              ${learningPoints.map(point => `<div class="list-item"><p style="line-height: 1.7;">${point}</p></div>`).join('')}
            </div>
          </div>
        </section>

        ${session.unlockedAchievements?.length ? `
          <section class="card panel" style="margin-bottom: 18px;">
            <div class="section-title"><h3>이번 세션에서 획득한 배지</h3></div>
            <div class="chip-row">
              ${session.unlockedAchievements.map(label => `<span class="badge">🏅 ${label}</span>`).join('')}
            </div>
          </section>
        ` : ''}

        <section class="card panel" style="margin-bottom: 18px;">
          <div class="section-title">
            <h3>틀린 문제 다시 보기</h3>
            <span class="muted small">정답과 해설 포함</span>
          </div>
          <div class="list">
            ${wrongAnswers.length ? wrongAnswers.map(item => `
              <div class="list-item">
                <div class="row-between" style="margin-bottom: 10px;">
                  <strong>${item.scenario?.title || item.scenarioId}</strong>
                  <div class="tag-row">
                    <span class="tag">내 응답 ${item.userAnswer}</span>
                    <span class="tag">정답 ${item.correctAnswer}</span>
                  </div>
                </div>
                <p class="muted" style="margin-bottom: 10px; line-height: 1.7;">${item.scenario?.scenarioDescription || ''}</p>
                <p style="line-height: 1.7;"><strong>해설:</strong> ${item.scenario?.explanation || ''}</p>
                <div class="tag-row" style="margin-top: 10px;">
                  ${(item.scenario?.riskTags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
              </div>
            `).join('') : `<div class="list-item"><strong>축하합니다.</strong><p class="muted" style="margin-top: 8px;">이번 세션에서는 틀린 문제가 없습니다.</p></div>`}
          </div>
        </section>

        <section class="btn-row">
          <a class="btn btn-primary" href="https://gportal.lgad.lg.co.kr/portal/main/portalMain.do" target="_blank" rel="noopener noreferrer">이벤트 참여 인증</a>
          <button class="btn btn-primary" id="playAgainBtn">다시 시작</button>
          <button class="btn btn-secondary" id="reviewNowBtn">오답 복습</button>
          <button class="btn btn-secondary" id="goHomeBtn">홈으로</button>
        </section>
      `;

      document.getElementById('playAgainBtn').onclick = () => startGame('quick', 'all');
      document.getElementById('reviewNowBtn').onclick = () => startGame('review', 'all');
      document.getElementById('goHomeBtn').onclick = () => {
        state.screen = 'home';
        render();
      };
    }

    function getCategoryDescription(key) {
      const map = {
        stock: 'Editorial Only, Extended License, 인물·상표 포함 여부 등 스톡 이미지의 핵심 제한을 점검합니다.',
        ai: '생성형 AI 산출물의 유사성, 학습데이터, 약관상 권리 귀속과 면책 범위를 살핍니다.',
        model: '모델 초상 사용의 기간·지역·매체·부수컷 범위 등 계약 해석 포인트를 학습합니다.',
        trademark: '타사 상표·로고 사용의 혼동, 비교광고, 후원관계 오인 리스크를 다룹니다.',
        media: '드라마 스틸, 스포츠 클립, 뉴스 캡처 등 영상·사진 인용의 경계를 익힙니다.',
        font: '폰트의 웹 임베딩, 로고 사용, 굿즈 판매, 오픈라이선스 조건을 확인합니다.',
        location: '건물·공간·미술품·랜드마크 촬영의 프로퍼티 릴리즈와 광고 활용 범위를 점검합니다.',
        audio: '음원·효과음·플랫폼 BGM의 저작권, 인접권, 사용범위 제한을 학습합니다.',
        basics: '저작권의 성립, 양도, 침해 판단, 업무상저작물, 미술·영상 일반론 등 기초 법리를 학습합니다.'
      };
      return map[key] || '';
    }

    function buildNextStepText(action) {
      const map = {
        proceed: '현재 시나리오에서는 상대적으로 리스크가 낮은 편입니다. 다만 실제 집행 전 최종 라이선스 문구와 계약 범위를 다시 확인하는 것이 바람직합니다.',
        confirm_license: '약관, 라이선스 종류, 사용 목적, 매체, 지역, 기간, 복제수량을 확인한 뒤 집행 여부를 결정해야 합니다. 필요한 경우 권리자 또는 공급사에 추가 허락을 요청하세요.',
        escalate_legal: '광고·대외 홍보 전에 법무 또는 컴플라이언스 검토를 거쳐야 합니다. 상표, 초상, 저작권, 부정경쟁 이슈가 결합될 수 있으므로 사실관계와 계약문서를 함께 정리해 두는 것이 좋습니다.',
        do_not_use: '현재 상태로는 사용을 중단하고 대체 소재를 검토하는 것이 안전합니다. 권리 범위를 새로 확보하지 않는 한 집행 리스크가 높습니다.'
      };
      return map[action] || map.confirm_license;
    }

    function buildLearningPoints(session) {
      const points = [];
      const wrong = session.answers.filter(a => !a.isCorrect).map(a => SCENARIOS.find(s => s.id === a.scenarioId)).filter(Boolean);
      const categories = [...new Set(wrong.map(s => s.category))];
      if (!wrong.length) {
        return [
          '정답률이 높습니다. 다음 단계로는 각 자산 유형별 계약서 문구와 실제 라이선스 조건을 연결해서 학습해 보세요.',
          '실무에서는 “출처 표시 = 사용 가능”이 아니라는 점, 그리고 내부 사용과 대외 광고 사용의 차이를 계속 구분하는 것이 중요합니다.',
          '오답이 없더라도 매체·기간·지역·상품화 범위는 항상 별도 체크하는 습관을 유지하세요.'
        ];
      }
      if (categories.includes('stock') || categories.includes('font') || categories.includes('audio')) {
        points.push('라이선스형 자산은 구매 여부보다도 허용 범위가 핵심입니다. 매체, 기간, 지역, 복제수량, 임베딩 여부를 항목별로 확인하세요.');
      }
      if (categories.includes('model') || categories.includes('ai')) {
        points.push('인물 또는 AI 생성물은 식별 가능성, 닮은꼴, 계약기간, 2차 이용 범위 등 퍼블리시티·초상 관련 쟁점을 함께 봐야 합니다.');
      }
      if (categories.includes('trademark') || categories.includes('location') || categories.includes('media')) {
        points.push('브랜드·장소·영상물은 단일 권리만 있는 경우가 드뭅니다. 저작권, 상표, 촬영허가, 이벤트 권리 등 복합 권리 구조로 접근하세요.');
      }
      if (categories.includes('basics')) {
        points.push('기초개념 문항은 개별 자산보다 권리 구조 자체를 묻습니다. 저작인격권과 저작재산권의 구분, 업무상저작물 요건, 침해 판단 요소를 먼저 정리해 두면 실무 판단이 빨라집니다.');
      }
      points.push('실무 판단 기준으로는 “내부 참고”, “대외 홍보”, “광고 집행”, “상품 판매”를 구분하면 리스크 수준을 더 명확하게 볼 수 있습니다.');
      return points.slice(0, 3);
    }
  </script>
</body>
